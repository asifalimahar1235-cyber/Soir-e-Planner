<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Soirée Planner</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="hero">
      <div>
        <h1>Soirée Planner</h1>
        <p>Manage RSVPs, waitlist attendance, dietary preferences, and seating for a 120-guest fire-code capacity.</p>
      </div>
    </header>

    <main class="main-grid">
      <section class="card form-card">
        <h2>New RSVP</h2>
        <form id="rsvp-form" class="rsvp-form">
          <label>
            Guest name
            <input id="guest-name" type="text" placeholder="Jane Doe" required />
          </label>

          <label>
            Dietary preference
            <select id="guest-dietary">
              <option value="none">None</option>
              <option value="vegetarian">Vegetarian</option>
              <option value="vegan">Vegan</option>
              <option value="gluten-free">Gluten-Free</option>
            </select>
          </label>

          <label class="checkbox-label">
            <input id="guest-plus-one" type="checkbox" />
            Includes plus-one
          </label>

          <label>
            RSVP status
            <select id="guest-status">
              <option value="confirmed">Confirmed</option>
              <option value="declined">Declined</option>
            </select>
          </label>

          <button type="submit" class="primary-button">Add RSVP</button>
        </form>
      </section>

      <section class="card summary-card">
        <h2>Attendance Summary</h2>
        <div class="summary-grid">
          <div class="summary-item">
            <span class="summary-label">Capacity</span>
            <strong>120</strong>
          </div>
          <div class="summary-item">
            <span class="summary-label">Confirmed guests</span>
            <strong id="confirmed-count">0</strong>
          </div>
          <div class="summary-item">
            <span class="summary-label">Remaining spots</span>
            <strong id="remaining-spots">120</strong>
          </div>
          <div class="summary-item">
            <span class="summary-label">Waitlist total</span>
            <strong id="waitlist-count">0</strong>
          </div>
        </div>

        <div class="dietary-panel">
          <h3>Dietary summary</h3>
          <ul id="dietary-summary" class="dietary-summary"></ul>
        </div>
      </section>

      <section class="card list-card full-width">
        <h2>Confirmed Guests</h2>
        <div id="confirmed-list" class="guest-list"></div>
      </section>

      <section class="card list-card full-width">
        <h2>Waitlist</h2>
        <div id="waitlist" class="guest-list"></div>
      </section>

      <section class="card seating-card full-width">
        <h2>Seating Chart</h2>
        <div class="tables-grid" id="tables-grid"></div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
